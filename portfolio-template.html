<!-- ============================================
     PORTFOLIO ITEM TEMPLATE
     Copy this template to add a new project
     ============================================ -->

<!-- Step 1: Copy the entire block below -->
<div class="col-lg-4 col-md-6 portfolio-item filter-YOURTYPE">
    <div class="portfolio-wrap">
        <!-- Step 2: Replace with your image path -->
        <img src="assets/img/portfolio/your-image.jpg" alt="Your Project Name">

        <div class="portfolio-info">
            <!-- Step 3: Update category (WEB, APP, GAME, AUDIO, IoT, FINTECH, R&D, etc.) -->
            <span class="portfolio-category">Your Category</span>

            <!-- Step 4: Update project title -->
            <h4>Your Project Title</h4>

            <div class="portfolio-links">
                <!-- Step 5: Update image path for lightbox -->
                <a href="assets/img/portfolio/your-image.jpg" data-gallery="portfolioGallery" class="portfolio-lightbox"
                    title="Your Project Title"><i class="bx bx-search-alt"></i></a>

                <!-- Step 6: Keep or update details link -->
                <a href="portfolio-details.html" class="portfolio-details-lightbox" title="Portfolio Details"><i
                        class="bx bx-link-external"></i></a>
            </div>
        </div>
    </div>
</div>

<!-- ============================================
     MULTI-CATEGORY EXAMPLE
     For projects in multiple categories
     ============================================ -->

<div class="col-lg-4 col-md-6 portfolio-item filter-web filter-app filter-iot-es">
    <div class="portfolio-wrap">
        <img src="assets/img/portfolio/multi-category.jpg" alt="Multi Category Project">

        <div class="portfolio-info">
            <!-- Use bullet points (•) to separate multiple categories -->
            <span class="portfolio-category">Web • App • IoT</span>

            <h4>Multi-Category Project Name</h4>

            <div class="portfolio-links">
                <a href="assets/img/portfolio/multi-category.jpg" data-gallery="portfolioGallery"
                    class="portfolio-lightbox" title="Multi-Category Project Name"><i class="bx bx-search-alt"></i></a>
                <a href="portfolio-details.html" class="portfolio-details-lightbox" title="Portfolio Details"><i
                        class="bx bx-link-external"></i></a>
            </div>
        </div>
    </div>
</div>

<!-- ============================================
     FILTER CLASSES REFERENCE
     Add these to portfolio-item class
     ============================================
     
filter-web        - Web projects
filter-app        - Mobile apps
filter-game       - Games
filter-audio      - Audio/Music projects
filter-iot-es     - IoT & Embedded Systems
filter-firmware   - Firmware projects
filter-fintech    - FinTech projects
filter-rd         - Research & Development

You can add multiple: filter-web filter-app filter-iot-es

     ============================================ -->
