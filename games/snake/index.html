<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReeGames - Snake</title>
    <link href="../../assets/img/favicon.png" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="../../assets/css/games.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            background: #1a1a2e;
            overflow: hidden;
        }

        h1 {
            color: #4ecca3;
            margin-bottom: 10px;
        }

        #score {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        #gameCanvas {
            border: 3px solid #4ecca3;
            border-radius: 10px;
            background: #16213e;
            max-height: calc(100vh - 250px);
        }

        #controls {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        #startBtn {
            margin-top: 10px;
            padding: 12px 30px;
            font-size: 1rem;
            font-family: 'Orbitron', sans-serif;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        #startBtn:hover {
            background: #3ba882;
            transform: scale(1.05);
        }
    </style>
</head>

<body data-no-shared-navbar>

    <header class="game-header">
        <div class="game-title">🐍 Snake</div>
        <nav class="game-nav">
            <a class="game-btn" href="../">Games Menu</a>
            <a class="game-btn primary" href="../../">Home</a>
        </nav>
    </header>

    <div class="game-viewport">
        <h1>Snake Classic</h1>
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="400" height="400" class="responsive-canvas"></canvas>
        <div id="controls" class="keyboard-hint">Use Arrow Keys to Move</div>
        <button id="startBtn">Start Game</button>
    </div>

    <!-- Touch Controls for Mobile -->
    <div class="touch-controls" id="touchControls">
        <div class="touch-dpad">
            <button class="touch-btn up" id="btnUp">↑</button>
            <button class="touch-btn left" id="btnLeft">←</button>
            <button class="touch-btn right" id="btnRight">→</button>
            <button class="touch-btn down" id="btnDown">↓</button>
        </div>
    </div>

    <footer class="game-footer">
        <a href="../">ReeGames</a> • Eat the food, grow longer!
    </footer>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let dx = 0, dy = 0;
        let score = 0;
        let gameLoop;
        let gameRunning = false;

        function init() {
            snake = [{ x: 10, y: 10 }];
            food = spawnFood();
            dx = 0; dy = 0;
            score = 0;
            scoreDisplay.textContent = 'Score: 0';
        }

        function spawnFood() {
            return {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw food
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Draw snake
            snake.forEach((segment, i) => {
                ctx.fillStyle = i === 0 ? '#4ecca3' : '#3ba882';
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function update() {
            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = 'Score: ' + score;
                food = spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            clearInterval(gameLoop);
            gameRunning = false;
            startBtn.textContent = 'Play Again';
            startBtn.style.display = 'block';
            alert('Game Over! Score: ' + score);
        }

        function startGame() {
            init();
            draw();
            startBtn.style.display = 'none';
            gameRunning = true;
            gameLoop = setInterval(update, 100);
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            switch (e.key) {
                case 'ArrowUp': if (dy !== 1) { dx = 0; dy = -1; } break;
                case 'ArrowDown': if (dy !== -1) { dx = 0; dy = 1; } break;
                case 'ArrowLeft': if (dx !== 1) { dx = -1; dy = 0; } break;
                case 'ArrowRight': if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        });

        // Touch controls for mobile
        document.getElementById('btnUp').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && dy !== 1) { dx = 0; dy = -1; }
        });
        document.getElementById('btnDown').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && dy !== -1) { dx = 0; dy = 1; }
        });
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && dx !== 1) { dx = -1; dy = 0; }
        });
        document.getElementById('btnRight').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && dx !== -1) { dx = 1; dy = 0; }
        });

        // Swipe controls
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const diffX = e.changedTouches[0].clientX - touchStartX;
            const diffY = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30 && dx !== -1) { dx = 1; dy = 0; }
                else if (diffX < -30 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if (diffY > 30 && dy !== -1) { dx = 0; dy = 1; }
                else if (diffY < -30 && dy !== 1) { dx = 0; dy = -1; }
            }
        });

        startBtn.addEventListener('click', startGame);
        init();
        draw();
    </script>
</body>

</html>
