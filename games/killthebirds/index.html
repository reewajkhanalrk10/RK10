<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReeGames - Kill The Birds</title>
  <link href="../../assets/img/favicon.png" rel="icon">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="../../assets/css/games.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      counter-reset: birds;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      margin: 0;
      padding: 0;
      background: #1b2838;
      font-family: 'Orbitron', sans-serif;
    }

    /* Main game container */
    .game-container {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /*hide checkbox*/
    input {
      position: fixed;
      left: -10px;
      top: -10px;
    }

    .game-title-text {
      color: #fff;
      font-size: 1.5rem;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(24, 210, 110, 0.5);
    }

    /*play area*/
    .wrapper {
      width: 100%;
      max-width: 800px;
      height: calc(100% - 80px);
      min-height: 300px;
      background: linear-gradient(to bottom, hsla(210, 70%, 80%, 1) 0%, hsla(210, 50%, 100%, 1) 100%);
      position: relative;
      cursor: crosshair;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    /* Score display */
    .score-display {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #333;
      z-index: 100;
    }

    .score-display::after {
      content: counter(birds);
    }

    /* Timer bar */
    .timer {
      background-color: #333;
      width: 100%;
      max-width: 300px;
      height: 40px;
      position: absolute;
      top: 10px;
      left: 20px;
      border-radius: 5px;
      overflow: hidden;
    }

    .timer span {
      display: block;
      background: repeating-linear-gradient(-45deg, #18d26e, #18d26e 10px, #13a456 10px, #13a456 20px);
      width: 100%;
      height: 100%;
      animation: timer 20s linear forwards;
    }

    .timer span::before {
      content: "TIME LEFT";
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 14px;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      letter-spacing: 2px;
    }

    @keyframes timer {
      0% {
        width: 10px;
      }

      100% {
        width: 100%;
      }
    }

    /*count dead birds*/
    .input-circle:checked {
      counter-increment: birds;
    }

    .input-circle~.pajaro {
      opacity: 0;
      transition: 0.3s cubic-bezier(0, .43, 1, 0);
      animation: move 8s infinite alternate;
    }

    .input-circle1:not(:checked)~.pajaro1,
    .input-circle2:not(:checked)~.pajaro2,
    .input-circle3:not(:checked)~.pajaro3,
    .input-circle4:not(:checked)~.pajaro4,
    .input-circle5:not(:checked)~.pajaro5,
    .input-circle6:not(:checked)~.pajaro6 {
      opacity: 1;
    }

    .input-circle1:checked~.pajaro1 span,
    .input-circle2:checked~.pajaro2 span,
    .input-circle3:checked~.pajaro3 span,
    .input-circle4:checked~.pajaro4 span,
    .input-circle5:checked~.pajaro5 span,
    .input-circle6:checked~.pajaro6 span {
      display: block;
    }

    .pajaro {
      background: black;
      border-radius: 50% 50% 20% 20%;
      color: white;
      line-height: 20px;
      letter-spacing: 2px;
      font-size: 0.8em;
      text-align: center;
      position: absolute;
      margin-top: -20px;
      margin-left: -10px;
      width: 15px;
      height: 15px;
      animation: planeo 0.8s linear infinite;
      z-index: 50;
      cursor: crosshair;
    }

    .pajaro>span {
      display: none;
      position: absolute;
      z-index: 2;
      left: -250%;
      bottom: -50%;
      background-color: white;
      border: solid 2px #000;
      width: 80px;
      height: 30px;
      padding: 10px;
      border-radius: 50%;
    }

    .pajaro>span::before {
      content: "I'm Dead!";
      color: red;
      font-weight: bold;
    }

    .pajaro1 {
      top: 15%;
      animation-delay: -2s !important;
      transform: scale(0.9);
    }

    .pajaro2 {
      top: 25%;
      animation-delay: -4s !important;
      transform: scale(0.5);
    }

    .pajaro3 {
      top: 45%;
      animation-delay: -3s !important;
      transform: scale(1.4);
    }

    .pajaro4 {
      top: 20%;
      animation-delay: -12s !important;
      transform: scale(0.9);
    }

    .pajaro5 {
      top: 35%;
      animation-delay: -16s !important;
      transform: scale(0.5);
    }

    .pajaro6 {
      top: 55%;
      animation-delay: -20s !important;
      transform: scale(1.4);
    }

    @keyframes move {
      0% {
        left: 5%;
      }

      20% {
        left: 20%;
        top: 50%;
      }

      40% {
        top: 30%;
        left: 60%;
      }

      60% {
        top: 70%;
        left: 80%;
      }

      80% {
        top: 15%;
        left: 25%;
      }

      100% {
        top: 35%;
        left: 20%;
      }
    }

    .pajaro::after,
    .pajaro::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
    }

    /* wings */
    .pajaro::after {
      border-radius: 100% 100% 0 0;
      box-shadow: inset 0px 5px 0 black;
      width: 100px;
      height: 100px;
      margin-top: -7px;
      margin-left: -50px;
      transform-origin: 100% 0%;
      animation: alas 3s linear infinite;
    }

    /* beak */
    .pajaro::before {
      background: #FFC37F;
      border-radius: 100% 0% 20% 0%;
      margin-top: 3px;
      margin-left: -4px;
      width: 6px;
      height: 6px;
      transform: rotateZ(45deg);
    }

    @keyframes alas {
      50% {
        transform: rotateX(-1440deg);
      }
    }

    @keyframes planeo {
      40% {
        transform: rotateZ(2deg) translateX(2px) translateY(10px);
        line-height: 16px;
        font-size: 0.6em;
      }

      80% {
        transform: rotateZ(-2deg) translateX(5px) translateY(8px);
      }
    }

    /* Game Over Overlay */
    .gameover-overlay {
      position: absolute;
      z-index: 1000;
      left: 0;
      top: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(24, 36, 62, 0.95));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0;
      pointer-events: none;
      animation: showGameover 20s linear forwards;
      border-radius: 10px;
    }

    .gameover-overlay h2 {
      font-size: 3rem;
      color: #ff4444;
      text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
      margin: 0;
      animation: pulse 1s ease-in-out infinite;
    }

    .gameover-overlay .final-score {
      font-size: 1.5rem;
      color: #18d26e;
      margin-bottom: 20px;
    }

    .gameover-overlay .final-score::after {
      content: counter(birds);
    }

    .gameover-buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .gameover-buttons a {
      padding: 15px 30px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .gameover-buttons .retry-btn {
      background: #18d26e;
      color: #fff;
      border: 2px solid #18d26e;
    }

    .gameover-buttons .retry-btn:hover {
      background: #13a456;
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(24, 210, 110, 0.5);
    }

    .gameover-buttons .back-btn {
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    .gameover-buttons .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #fff;
      transform: scale(1.05);
    }

    @keyframes showGameover {

      0%,
      97% {
        opacity: 0;
        pointer-events: none;
      }

      100% {
        opacity: 1;
        pointer-events: auto;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .gameover-overlay h2 {
        font-size: 2rem;
      }

      .game-title-text {
        font-size: 1rem;
      }

      .timer {
        max-width: 150px;
        height: 30px;
      }

      .timer span::before {
        font-size: 10px;
      }
    }
  </style>
</head>

<body data-no-shared-navbar class="game-page">

  <!-- Game Header -->
  <header class="game-header">
    <div class="game-title">🎯 Kill The Birds</div>
    <nav class="game-nav">
      <a class="game-btn" href="../">Games Menu</a>
      <a class="game-btn primary" href="../../">Home</a>
    </nav>
  </header>

  <!-- Game Container -->
  <div class="game-container">
    <div class="game-title-text">Shoot all the birds before time runs out!</div>

    <div class="wrapper">
      <!-- Timer -->
      <div class="timer"><span></span></div>

      <!-- Score -->
      <div class="score-display">SCORE: </div>

      <!-- Inputs -->
      <input class="input-circle input-circle1" type="radio" id="circle1">
      <input class="input-circle input-circle2" type="radio" id="circle2">
      <input class="input-circle input-circle3" type="radio" id="circle3">
      <input class="input-circle input-circle4" type="radio" id="circle4">
      <input class="input-circle input-circle5" type="radio" id="circle5">
      <input class="input-circle input-circle6" type="radio" id="circle6">

      <!-- Birds -->
      <label for="circle1" class="pajaro pajaro1"><span></span></label>
      <label for="circle2" class="pajaro pajaro2"><span></span></label>
      <label for="circle3" class="pajaro pajaro3"><span></span></label>
      <label for="circle4" class="pajaro pajaro4"><span></span></label>
      <label for="circle5" class="pajaro pajaro5"><span></span></label>
      <label for="circle6" class="pajaro pajaro6"><span></span></label>

      <!-- Game Over Overlay -->
      <div class="gameover-overlay">
        <h2>GAME OVER BITCH!</h2>
        <div class="final-score">Your Score: </div>
        <div class="gameover-buttons">
          <a href="" class="retry-btn" onclick="location.reload(); return false;">🔄 Play Again</a>
          <a href="../" class="back-btn">📋 Games Menu</a>
          <a href="../../" class="back-btn">🏠 Home</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Game Footer -->
  <footer class="game-footer">
    <a href="../">ReeGames</a> • Click the birds to hunt them down!
  </footer>

</body>

</html>
